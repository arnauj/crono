<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Stopwatch body -->
  <circle cx="32" cy="36" r="24" fill="#0a0a0a" stroke="#06b6d4" stroke-width="3"/>
  <circle cx="32" cy="36" r="20" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.15"/>

  <!-- Top button -->
  <rect x="28" y="6" width="8" height="8" rx="2" fill="#06b6d4"/>

  <!-- Crown / side button -->
  <rect x="50" y="22" width="6" height="8" rx="2" fill="#06b6d4"/>

  <!-- Tick marks -->
  <line x1="32" y1="18" x2="32" y2="22" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="50" x2="32" y2="54" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="14" y1="36" x2="18" y2="36" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="46" y1="36" x2="50" y2="36" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- Minute hand -->
  <line x1="32" y1="36" x2="32" y2="21" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Second hand -->
  <line x1="32" y1="36" x2="43" y2="28" stroke="#f43f5e" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="32" cy="36" r="2.5" fill="#fff"/>
</svg>
